name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROTOC_VERSION: "25.9"
  PROTOC_GEN_GO_VERSION: "v1.36.11"
  PROTOC_GEN_GO_GRPC_VERSION: "v1.6.2"

jobs:
  proto:
    name: lint, generate, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install protoc (pinned)
        run: |
          curl -sSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q -o /tmp/protoc.zip -d /usr/local
          sudo chmod +x /usr/local/bin/protoc
          protoc --version

      - name: Install Go protoc plugins (pinned)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_VERSION}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${PROTOC_GEN_GO_GRPC_VERSION}

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint .proto with buf
        run: buf lint

      - name: Generate Go code
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          find gen -name .gitkeep -delete || true
          bash ./scripts/generate.sh

      - name: Check that committed gen/ matches regenerated
        run: |
          echo "::group::files under gen/"
          find gen -type f | sort
          echo "::endgroup::"
          if [ -n "$(git status --porcelain gen/)" ]; then
            echo "::error::generated code is out of date. Run ./scripts/generate.sh locally and commit the result."
            git --no-pager status gen/
            git --no-pager diff gen/ || true
            exit 1
          fi

      - name: Tidy go.mod
        run: go mod tidy

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...